name: Java checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '.github/**'
      - README.md
      - gradle.properties

jobs:
  call-java-checks:
    if : ${{ github.event_name == 'pull_request' && github.base_ref != 'refs/heads/master' }}
    name: Call Java Checks
    uses: reportportal/.github/.github/workflows/java-checks.yaml@main
    with:
      checkstyle-config: './checkstyle.xml'
    secrets: inherit

  call-release-java-checks:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'refs/heads/master' }}
    name: Call Release Java Checks
    permissions:
      contents: read
      checks: write
    uses: reportportal/.github/.github/workflows/java-checks.yaml@8aa8cd32982dc04c87ae68f52225592dda42e644
    with:
      release-mode: true
    secrets: inherit
