name: Retag RC Docker image

on:
  pull_request_review:
    types: [submitted]

jobs:
  release:
    if: >
      github.event.review.state == 'approved' &&
      (startsWith(github.event.pull_request.head.ref, 'rc/') || startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    # TODO: Pin reusable workflow to a version tag once v1 is released
    uses: reportportal/.github/.github/workflows/dockerhub-release.yaml@main
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    with:
      aws-region: ${{ vars.AWS_REGION }}
      ecr-repository: ${{ vars.ECR_REPOSITORY || 'service-api' }}
      target-registry: ${{ vars.TARGET_REGISTRY || 'docker.io' }}
      target-repository: ${{ vars.TARGET_REPOSITORY || 'reportportal/service-api' }}
      platforms: ${{ vars.BUILD_PLATFORMS || 'linux/amd64,linux/arm64' }}
      release-mode: rc
